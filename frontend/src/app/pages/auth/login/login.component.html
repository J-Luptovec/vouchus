<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Sign In</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        @if (error()) {
          <p class="form-error">{{ error() }}</p>
        }
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <mat-error>Valid email required</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          @if (form.get('password')?.invalid && form.get('password')?.touched) {
            <mat-error>Password required</mat-error>
          }
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="full-width submit-btn" [disabled]="form.invalid || loading()">
          {{ loading() ? 'Signing in…' : 'Sign In' }}
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <p class="alt-link">Don't have an account? <a routerLink="/register">Register</a></p>
    </mat-card-actions>
  </mat-card>
</div>
