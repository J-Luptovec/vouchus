services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vouchus
      POSTGRES_PASSWORD: vouchus
      POSTGRES_DB: vouchus_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vouchus -d vouchus_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vouchus:vouchus@db:5432/vouchus_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  pgdata:
